<!DOCTYPE html>
<html>
<head>

<title>Exam Evaluator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="text-center">Exam Response Evaluator</h3>

<form action="/evaluate" method="post" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label">Name</label>
<input class="form-control" name="name" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile</label>
<input class="form-control" name="mobile" required>
</div>

<div class="mb-3">
<label class="form-label">Upload Response Sheet</label>
<input type="file" class="form-control" name="file" required>
</div>

<button class="btn btn-primary w-100">Evaluate</button>

</form>

<br>

<a href="/leaderboard" class="btn btn-success w-100">Leaderboard</a>

</div>

</div>

</body>
</html>
