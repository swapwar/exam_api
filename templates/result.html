<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow p-4">

<h3 class="text-center">Exam Result</h3>

<hr>

<p><b>Name:</b> {{result.name}}</p>
<p><b>Mobile:</b> {{result.mobile}}</p>

<hr>

<div class="row text-center">

<div class="col">
<h4 class="text-success">{{result.correct}}</h4>
<p>Correct</p>
</div>

<div class="col">
<h4 class="text-danger">{{result.wrong}}</h4>
<p>Wrong</p>
</div>

<div class="col">
<h4 class="text-secondary">{{result.unattempted}}</h4>
<p>Unattempted</p>
</div>

</div>

<hr>

<h4 class="text-center">Score: {{result.score}}</h4>
<p class="text-center">Accuracy: {{result.accuracy}}%</p>

<br>

<div class="text-center">

<a href="/static/result.xlsx" class="btn btn-success">
Download Excel Report
</a>

<a href="/leaderboard" class="btn btn-primary">
View Leaderboard
</a>

<a href="/" class="btn btn-secondary">
Evaluate Another
</a>

</div>

</div>

</div>

</body>
</html>
