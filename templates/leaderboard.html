<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h3>Leaderboard</h3>

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Score</th>
<th>Accuracy</th>
</tr>

{% for row in rows %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}%</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
